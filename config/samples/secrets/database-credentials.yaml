---
apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: default
type: Opaque
stringData:
  # Shared credentials(username & password) for SQL-shaped databases
  # (postgresql, mysql, mariadb, mongodb, mssql)
  username: "YOUR_DATABASE_USERNAME"
  # Redis: password-only auth, kept separate
  password: "YOUR_DATABASE_PASSWORD"

  # InfluxDB: token-based auth
  token: "YOUR_INFLUXDB_TOKEN"
